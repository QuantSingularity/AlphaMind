---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphamind-redis
  namespace: alphamind-prod
  labels:
    app: alphamind-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: alphamind-redis
  template:
    metadata:
      labels:
        app: alphamind-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: alphamind-redis
          image: redis:7.0-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # Password authentication — consistent with REDIS_AUTH_ENABLED: "true" in ConfigMap
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --save
            - "60 1"
            - --requirepass
            - $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alphamind-secrets
                  key: redis-password
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: alphamind-redis-data
              mountPath: /data
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: alphamind-redis-data
          persistentVolumeClaim:
            claimName: alphamind-redis-pvc
        - name: tmp-dir
          emptyDir: {}
