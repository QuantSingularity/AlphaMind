---
# IMPORTANT: Replace all "placeholder" values with real base64-encoded secrets before deploying.
# Generate: echo -n "your-secret" | base64
# Use a secrets manager (Vault, AWS Secrets Manager, GCP Secret Manager) in production.
apiVersion: v1
kind: Secret
metadata:
  name: alphamind-secrets
  namespace: alphamind-prod
  annotations:
    description: "Application secrets — managed by external secrets operator in production"
  labels:
    app: alphamind-app
    component: secrets
    security.alphamind.io/classification: "confidential"
    security.alphamind.io/data-type: "financial"
type: Opaque
data:
  # echo -n "mysql://alphamind_user:pass@alphamind-database:3306/alphamind_db" | base64
  database-url: cGxhY2Vob2xkZXI=
  # openssl rand -base64 64 | tr -d '\n' | base64
  jwt-secret: cGxhY2Vob2xkZXI=
  mysql-root-password: cGxhY2Vob2xkZXI=
  mysql-password: cGxhY2Vob2xkZXI=
  api-key: cGxhY2Vob2xkZXI=
  encryption-key: cGxhY2Vob2xkZXI=
  backup-encryption-key: cGxhY2Vob2xkZXI=
  audit-signing-key: cGxhY2Vob2xkZXI=
  # Added: Redis password (required by REDIS_AUTH_ENABLED: "true" in ConfigMap)
  redis-password: cGxhY2Vob2xkZXI=

---
apiVersion: v1
kind: Secret
metadata:
  name: alphamind-tls-secrets
  namespace: alphamind-prod
  annotations:
    description: "TLS certificates — managed by cert-manager"
  labels:
    app: alphamind-app
    component: tls
    security.alphamind.io/classification: "confidential"
type: kubernetes.io/tls
data:
  tls.crt: cGxhY2Vob2xkZXI=
  tls.key: cGxhY2Vob2xkZXI=
  ca.crt: cGxhY2Vob2xkZXI=

---
apiVersion: v1
kind: Secret
metadata:
  name: alphamind-db-backup-secret
  namespace: alphamind-prod
  labels:
    app: alphamind-app
    component: backup
type: Opaque
data:
  backup-user: cGxhY2Vob2xkZXI=
  backup-password: cGxhY2Vob2xkZXI=
  backup-encryption-key: cGxhY2Vob2xkZXI=

---
apiVersion: v1
kind: Secret
metadata:
  name: alphamind-monitoring-secrets
  namespace: alphamind-prod
  labels:
    app: alphamind-app
    component: monitoring
type: Opaque
data:
  prometheus-auth: cGxhY2Vob2xkZXI=
  grafana-admin-password: cGxhY2Vob2xkZXI=
  alertmanager-webhook-url: cGxhY2Vob2xkZXI=
