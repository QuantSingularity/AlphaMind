---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: alphamind-backend-pdb
  namespace: alphamind-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: alphamind-backend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: alphamind-frontend-pdb
  namespace: alphamind-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: alphamind-frontend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: alphamind-database-pdb
  namespace: alphamind-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: alphamind-database

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: alphamind-redis-pdb
  namespace: alphamind-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: alphamind-redis
