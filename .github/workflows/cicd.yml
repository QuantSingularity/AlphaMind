name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  code_quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    env:
      BACKEND_DIR: code/backend
      WEB_FRONTEND_DIR: web-frontend
      MOBILE_FRONTEND_DIR: mobile-frontend
      INFRASTRUCTURE_DIR: infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python formatters
        run: python -m pip install autoflake black==25.11.0

      - name: Check backend Python formatting
        run: |
          if [ -d "${BACKEND_DIR}" ]; then
            black "${BACKEND_DIR}" --check
          fi

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Global Formatters
        run: npm install -g prettier prettier-plugin-solidity

      - name: Check Formatting (All Web/Mobile/JS/TS)
        run: |
          # We manually load the plugin from the global node_modules
          NODE_GLOBAL=$(npm root -g)
          prettier --plugin="$NODE_GLOBAL/prettier-plugin-solidity/dist/index.js" \
          --check "**/*.{js,jsx,ts,tsx,json,html,css,md,sol,yml,yaml}"

      - name: Quality checks complete
        run: echo "Clean root formatting check passed."

  backend_tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: code_quality
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies and Run Tests
        run: |
          python -m pip install pytest pytest-cov pytest-asyncio
          if [ -f "code/backend/requirements.txt" ]; then
            python -m pip install -r code/backend/requirements.txt
          fi
          cd code/backend && pytest tests/ --cov=.
